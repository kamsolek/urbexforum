<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Urbex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Witamy na urbexforum.pl</h1>
        <button id="login-btn">Zaloguj / Zarejestruj</button>
    </header>
    
    <nav>
        <ul>
            <li><a href="#">Strona Główna</a></li>
            <li><a href="#">O nas</a></li>
            <li><a href="#">Kontakt</a></li>
            <li><a href="#">Kontakt</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
    </nav>
    
    <main>
        <section class="forum" id="forum">
            <!-- Przykładowe kafelki postów -->
            <div id="postModal" class="post-modal">
                <div class="post-modal-content">
                    <span class="close">&times;</span>
                    <div class="modal-body">
                        <div class="modal-image">
                            <img src="urbex.jpeg" alt="Zdjęcie posta" id="modalImage">
                        </div>
                        <div class="modal-details">
                            <h2 id="modalTitle">Tytuł posta</h2>
                            <p id="modalDescription">Opis posta</p>
                            <div class="comments-section">
                                <h3>Komentarze:</h3>
                                <ul id="commentsList">
                                    <!-- Lista komentarzy -->
                                </ul>
                                <textarea id="newComment" placeholder="Dodaj komentarz..."></textarea>
                                <button id="addComment">Dodaj komentarz</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </section>
    </main>
    
    <!-- Modal Logowania/Rejestracji -->
<div id="loginModal" class="login-modal">
    <div class="login-modal-content">
        <span class="login-close">&times;</span>
        
        <!-- Formularz logowania -->
        <div id="loginForm">
            <h2>Zaloguj się</h2>
            <form>
                <label for="loginEmail">E-mail:</label>
                <input type="email" id="loginEmail" required>
                
                <label for="loginPassword">Hasło:</label>
                <input type="password" id="loginPassword" required>
                
                <button type="submit">Zaloguj</button>
            </form>
            <p>Nie masz konta? <a href="#" id="showRegister">Zarejestruj się</a></p>
        </div>

        <!-- Formularz rejestracji (ukryty domyślnie) -->
        <div id="registerForm" style="display: none;">
            <h2>Rejestracja</h2>
            <form>
                <label for="registerEmail">E-mail:</label>
                <input type="email" id="registerEmail" required>
                
                <label for="registerPassword">Hasło:</label>
                <input type="password" id="registerPassword" required>
                
                <label for="confirmPassword">Potwierdź hasło:</label>
                <input type="password" id="confirmPassword" required>
                
                <button type="submit">Zarejestruj się</button>
            </form>
            <p>Masz już konto? <a href="#" id="showLogin">Zaloguj się</a></p>
        </div>
    </div>
</div>

    
    <footer>
        <p>&copy; 2025 Forum Urbex</p>
        <p id="clock"></p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
